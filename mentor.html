<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentor Climatisation</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d0f12;--s1:#151820;--s2:#1c2030;--border:#2a3040;
  --accent:#00c8ff;--accent-d:rgba(0,200,255,0.1);
  --green:#00e5a0;--text:#e8eaf0;--muted:#6b7590;--dim:#3d4560;
  --warn:#ffb400;--warn-d:rgba(255,180,0,0.1);
  --mono:'IBM Plex Mono',monospace;--body:'IBM Plex Sans',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--body);font-weight:300;}
.shell{display:flex;flex-direction:column;height:100vh;}
.topbar{display:flex;align-items:center;gap:12px;padding:.9rem 1.5rem;background:var(--s1);border-bottom:1px solid var(--border);flex-shrink:0;}
.top-icon{width:38px;height:38px;border-radius:8px;background:var(--accent-d);border:1px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.top-title{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--accent);}
.top-sub{font-size:11px;color:var(--muted);font-family:var(--mono);}
.top-status{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--green);font-family:var(--mono);}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.mod-bar{display:flex;flex-wrap:wrap;gap:5px;padding:.75rem 1.5rem;background:var(--s1);border-bottom:1px solid var(--border);flex-shrink:0;}
.mpill{padding:4px 12px;border:1px solid var(--border);border-radius:20px;font-size:11px;cursor:pointer;background:transparent;color:var(--muted);font-family:var(--mono);transition:all .15s;}
.mpill:hover{border-color:var(--accent);color:var(--accent);}
.mpill.active{border-color:var(--accent);color:var(--accent);background:var(--accent-d);}
.pbar-bg{height:2px;background:var(--border);flex-shrink:0;}
.pbar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));transition:width .4s;width:0%;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:1rem 1.5rem;}
.quick-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;flex-shrink:0;}
.qbtn{font-size:11px;padding:4px 10px;border:1px solid var(--border);border-radius:16px;background:transparent;color:var(--muted);cursor:pointer;font-family:var(--mono);transition:all .15s;}
.qbtn:hover{border-color:var(--accent);color:var(--accent);}
.qbtn.warn{border-color:var(--warn);color:var(--warn);}
.terrain-box{background:var(--warn-d);border:1px solid var(--warn);border-radius:8px;padding:12px;margin-bottom:10px;display:none;flex-shrink:0;}
.terrain-box textarea{width:100%;min-height:80px;padding:8px;border:1px solid var(--warn);border-radius:6px;background:var(--bg);color:var(--text);font-size:12px;resize:vertical;outline:none;font-family:var(--body);margin-top:6px;}
.terrain-title{font-family:var(--mono);font-size:11px;color:var(--warn);margin-bottom:2px;}
.terrain-desc{font-size:11px;color:var(--muted);}
.terrain-btns{display:flex;justify-content:flex-end;gap:6px;margin-top:6px;}
.tbtn{padding:5px 12px;border:1px solid var(--border);border-radius:5px;background:transparent;color:var(--muted);font-size:11px;cursor:pointer;font-family:var(--mono);}
.tbtn.primary{border-color:var(--warn);color:var(--warn);background:var(--warn-d);}
.tbtn.primary:hover{background:var(--warn);color:var(--bg);}
.chat{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding-bottom:1rem;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.chat::-webkit-scrollbar{width:3px;}
.chat::-webkit-scrollbar-thumb{background:var(--border);}
.msg{display:flex;gap:8px;align-items:flex-start;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.msg.user{flex-direction:row-reverse;}
.av{width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0;border:1px solid var(--border);background:var(--s2);color:var(--muted);font-family:var(--mono);}
.av.agent{background:var(--accent-d);border-color:var(--accent);color:var(--accent);}
.av.terrain{background:var(--warn-d);border-color:var(--warn);color:var(--warn);}
.bub{max-width:82%;padding:10px 14px;border-radius:8px;font-size:13px;line-height:1.7;border:1px solid var(--border);background:var(--s1);color:var(--text);white-space:pre-wrap;}
.msg.user .bub{background:var(--accent-d);border-color:var(--accent);color:var(--accent);}
.bub.terrain-bub{background:var(--warn-d);border-color:var(--warn);color:var(--warn);font-style:italic;}
.bub strong{font-weight:500;color:var(--accent);}
.typing{display:flex;gap:4px;align-items:center;padding:10px 14px;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:blink 1.2s infinite;}
.dot:nth-child(2){animation-delay:.2s;}.dot:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
.input-zone{display:flex;gap:8px;padding-top:10px;flex-shrink:0;border-top:1px solid var(--border);}
.input-zone input{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:6px;background:var(--s1);color:var(--text);font-size:13px;outline:none;font-family:var(--body);transition:border-color .15s;}
.input-zone input:focus{border-color:var(--accent);}
.input-zone button{padding:10px 18px;border:1px solid var(--accent);border-radius:6px;background:var(--accent-d);color:var(--accent);font-family:var(--mono);font-size:12px;cursor:pointer;transition:all .15s;}
.input-zone button:hover{background:var(--accent);color:var(--bg);}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div class="top-icon">🧊</div>
    <div>
      <div class="top-title">MENTOR CLIM // v2.0</div>
      <div class="top-sub">Frigicoll · Thermoking · El Prat de Llobregat</div>
    </div>
    <div class="top-status"><div class="sdot"></div>EN LIGNE</div>
  </div>
  <div class="mod-bar" id="modBar"></div>
  <div class="pbar-bg"><div class="pbar-fill" id="pbar"></div></div>
  <div class="main">
    <div class="quick-row">
      <button class="qbtn" onclick="q('Explique-moi les bases du module')">→ bases</button>
      <button class="qbtn" onclick="q('Fais-moi un QCM de 3 questions')">→ QCM x3</button>
      <button class="qbtn" onclick="q('Schéma ASCII du composant principal')">→ schéma ASCII</button>
      <button class="qbtn" onclick="q('Cas pratique terrain chez Frigicoll')">→ cas pratique</button>
      <button class="qbtn" onclick="q('Points clés à retenir')">→ points clés</button>
      <button class="qbtn warn" onclick="toggleTerrain()">🔧 rapport terrain</button>
    </div>
    <div class="terrain-box" id="terrainBox">
      <div class="terrain-title">🔧 RAPPORT TERRAIN</div>
      <div class="terrain-desc">Décris ce que tu as fait ou vu aujourd'hui au taller. L'agent relie ton expérience aux concepts du module.</div>
      <textarea id="terrainTxt" placeholder="Ex: Aujourd'hui j'ai démonté un compresseur sur un Volvo FH, il y avait une fuite..."></textarea>
      <div class="terrain-btns">
        <button class="tbtn" onclick="toggleTerrain()">Annuler</button>
        <button class="tbtn primary" onclick="submitTerrain()">Analyser →</button>
      </div>
    </div>
    <div class="chat" id="chat"></div>
    <div class="input-zone">
      <input id="inp" placeholder="Pose ta question..." onkeydown="if(event.key==='Enter')send()"/>
      <button onclick="send()">ENVOYER →</button>
    </div>
  </div>
</div>
<script>
const API_KEY = 'ta cle api';
const MODS=[
  {label:'Électricité',topics:'tension (V), courant (A), résistance (Ohm), loi d\'Ohm, circuits série/parallèle, schémas 12V/24V, fusibles, relais, contacteurs, masse châssis, alternateur, batterie véhicule lourd'},
  {label:'Moteur',topics:'moteur diesel 4 temps, moteur électrique 12V/24V, courroie compresseur, vilebrequin, compresseur entraîné moteur vs diesel autonome, alternateur, gestion énergie embarquée camion'},
  {label:'Cycle frigo',topics:'thermodynamique, changement d\'état liquide/gaz, compresseur, condenseur, détendeur thermostatique/électronique, évaporateur, fluides R404A/R452A/R134a, HP/BP, surchauffe, sous-refroidissement, lecture manomètres'},
  {label:'Thermoking',topics:'gamme Frigoking/Thermoking camions et bus, unités frontales nose-mount, rooftop, split systems, diesel autonomes, panneau contrôle TK, codes alarmes, capteurs température/pression, câblage Thermoking, CANbus'},
  {label:'Installation',topics:'préparation véhicule, fixation mécanique unité, raccordement frigorifique (tuyaux, raccords, vannes Schrader), tirage au vide (pompe, micronmètre), charge fluide (bouteille, balance), raccordement électrique, mise en route'},
  {label:'Diagnostic',topics:'procédure diagnostic systématique, alarmes Thermoking, manomètres HP/BP, multimètre (tension/courant/résistance), pression anormale, fuite gaz, compresseur bloqué/bruyant, problèmes électriques, gel évaporateur, dégivrage'},
  {label:'Maintenance',topics:'planning 500h/1000h/2000h, nettoyage condenseur/évaporateur, courroies et filtres, contrôle charge fluide, détection fuites (détecteur électronique), resserrage connexions, firmware contrôleurs TK, rapport intervention, attestation capacité fluides'},
];
let curMod=0,history=[],msgCount=0;

document.getElementById('modBar').innerHTML=MODS.map((m,i)=>`<button class="mpill ${i===0?'active':''}" id="mp${i}" onclick="selectMod(${i})">${m.label}</button>`).join('');

function selectMod(i){
  curMod=i;history=[];msgCount=0;
  document.querySelectorAll('.mpill').forEach((b,j)=>b.classList.toggle('active',j===i));
  document.getElementById('chat').innerHTML='';
  document.getElementById('pbar').style.width='0%';
  addMsg('agent',`Module ${i} — ${MODS[i].label}\n\nOn repart de zéro. Sujets : ${MODS[i].topics.split(',').slice(0,3).join(', ')}...\n\nPar où tu veux commencer ?\n→ Explications de base\n→ Schéma ASCII\n→ QCM\n→ Cas pratique terrain`);
}

function sys(){return `Tu es un mentor expert en climatisation embarquée sur véhicules lourds. Tu formes un technicien débutant absolu qui va travailler chez Frigicoll (Thermoking/Frigoking), taller El Prat de Llobregat, Barcelona. Module [${curMod}] : "${MODS[curMod].label}". Sujets : ${MODS[curMod].topics}. Règles : français uniquement, niveau débutant absolu, analogies concrètes, schémas ASCII si demandé, QCM 3 questions format A/B/C (attendre les réponses avant de corriger), exemples terrain Thermoking, terminer par une question, jamais de flatterie.`;}

function addMsg(role,html,cls){
  const chat=document.getElementById('chat');
  const div=document.createElement('div');div.className='msg'+(role==='user'?' user':'');
  const av=document.createElement('div');av.className='av'+(role==='agent'?' agent':cls?' '+cls:'');av.textContent=role==='user'?'E':'C';
  const bub=document.createElement('div');bub.className='bub'+(cls?' terrain-bub':'');
  bub.innerHTML=html.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
  div.appendChild(av);div.appendChild(bub);chat.appendChild(div);chat.scrollTop=chat.scrollHeight;
  msgCount++;document.getElementById('pbar').style.width=Math.min(msgCount*4,95)+'%';
}

function addTyping(){
  const chat=document.getElementById('chat');
  const div=document.createElement('div');div.className='msg';div.id='typing';
  const av=document.createElement('div');av.className='av agent';av.textContent='C';
  const bub=document.createElement('div');bub.className='bub';
  bub.innerHTML='<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  div.appendChild(av);div.appendChild(bub);chat.appendChild(div);chat.scrollTop=chat.scrollHeight;
}

async function send(){
  const inp=document.getElementById('inp');const text=inp.value.trim();
  if(!text||document.getElementById('typing'))return;
  inp.value='';addMsg('user',text);history.push({role:'user',content:text});addTyping();
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,system:sys(),messages:history})
    });
    const d=await res.json();
    const reply=d.content?.find(b=>b.type==='text')?.text||'Erreur.';
    document.getElementById('typing')?.remove();addMsg('agent',reply);history.push({role:'assistant',content:reply});
  }catch(e){document.getElementById('typing')?.remove();addMsg('agent','Erreur : '+e.message);}
}

function q(text){document.getElementById('inp').value=text;send();}

function toggleTerrain(){
  const b=document.getElementById('terrainBox');
  b.style.display=b.style.display==='block'?'none':'block';
}

async function submitTerrain(){
  const txt=document.getElementById('terrainTxt').value.trim();if(!txt)return;
  toggleTerrain();document.getElementById('terrainTxt').value='';
  addMsg('user','[Rapport terrain] '+txt,'terrain');
  const prompt=`[RAPPORT TERRAIN]\n${txt}\n\nAnalyse mon expérience. Relie chaque élément aux concepts du module. Explique techniquement ce que j'ai observé, corrige sans ménagement si quelque chose est inexact.`;
  history.push({role:'user',content:prompt});addTyping();
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1200,system:sys(),messages:history})
    });
    const d=await res.json();const reply=d.content?.find(b=>b.type==='text')?.text||'Erreur.';
    document.getElementById('typing')?.remove();addMsg('agent',reply);history.push({role:'assistant',content:reply});
  }catch(e){document.getElementById('typing')?.remove();addMsg('agent','Erreur : '+e.message);}
}

selectMod(0);
</script>
</body>
</html>
