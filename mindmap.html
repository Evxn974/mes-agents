<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mindmap — NEXUS Holding</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f0f2f7;--s1:#ffffff;--s2:#e8eaf0;--border:#d0d4e4;
  --text:#1a1d2e;--muted:#5a6080;--dim:#9095b0;
  --accent:#3b82f6;
  --mono:'Syne',sans-serif;--body:'DM Sans',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--body);overflow:hidden;}

/* ===== TOOLBAR ===== */
.toolbar{position:fixed;top:0;left:0;right:0;background:var(--s1);border-bottom:1px solid var(--border);z-index:100;user-select:none;}
.tb-row{display:flex;align-items:center;gap:2px;padding:4px 10px;flex-wrap:nowrap;min-height:38px;}
.tb-row+.tb-row{border-top:1px solid var(--border);}
.tb-sep{width:1px;height:22px;background:var(--border);margin:0 4px;flex-shrink:0;}
.tb-label{font-size:10px;color:var(--muted);white-space:nowrap;padding:0 3px;}
.tb-btn{display:flex;align-items:center;gap:3px;padding:4px 8px;border:1px solid transparent;border-radius:5px;background:transparent;color:var(--muted);font-size:11px;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:var(--body);transition:all .12s;}
.tb-btn:hover{background:var(--s2);color:var(--text);border-color:var(--border);}
.tb-btn.active{background:var(--text);color:var(--s1);border-color:var(--text);}
.tb-btn.warn:hover{border-color:#ef4444;color:#ef4444;background:#fef2f2;}
.tb-select{padding:4px 6px;border:1px solid var(--border);border-radius:5px;background:var(--s1);color:var(--text);font-size:11px;outline:none;cursor:pointer;font-family:var(--body);max-width:120px;}
.tb-color{width:26px;height:26px;border-radius:5px;border:1px solid var(--border);cursor:pointer;padding:2px;flex-shrink:0;}
.tb-number{width:52px;padding:4px 6px;border:1px solid var(--border);border-radius:5px;background:var(--s1);color:var(--text);font-size:11px;outline:none;font-family:var(--body);}
.tb-range{width:70px;accent-color:var(--accent);}
.home-link{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--muted);text-decoration:none;padding:3px 8px;border:1px solid var(--border);border-radius:4px;flex-shrink:0;}
.home-link:hover{border-color:var(--text);color:var(--text);}
.tb-logo{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--text);margin-right:6px;white-space:nowrap;flex-shrink:0;}

/* ===== CANVAS ===== */
.canvas-wrap{position:fixed;left:0;right:0;bottom:0;overflow:hidden;background:var(--bg);cursor:grab;}
.canvas-wrap.grabbing{cursor:grabbing;}
.canvas-wrap.adding-node{cursor:crosshair;}
.canvas-wrap.adding-frame{cursor:crosshair;}
.canvas-wrap.connecting{cursor:cell;}
.canvas-wrap.panning{cursor:grab;}
.canvas-wrap.panning.grabbing{cursor:grabbing;}
.canvas-wrap.panning .node,.canvas-wrap.panning .frame,.canvas-wrap.panning .textbox{pointer-events:none;}
#canvas{position:absolute;top:0;left:0;transform-origin:0 0;}

/* BG GRID */
.canvas-wrap{background-image:radial-gradient(circle,#c8ccd8 1px,transparent 1px);background-size:24px 24px;}

/* ===== NODES ===== */
.node{position:absolute;border-radius:8px;padding:8px 14px;cursor:pointer;user-select:none;border:2px solid transparent;min-width:80px;max-width:240px;text-align:center;transition:box-shadow .15s;}
.node:hover{box-shadow:0 4px 20px rgba(0,0,0,.15);}
.node.selected{outline:2px solid var(--accent);outline-offset:2px;}
.node-label{font-size:12px;font-weight:500;line-height:1.3;pointer-events:none;}
.node-sub{font-size:10px;opacity:.75;margin-top:2px;line-height:1.3;pointer-events:none;}

/* ===== FRAMES ===== */
.frame{position:absolute;border-radius:6px;cursor:pointer;user-select:none;border:2px solid #94a3b8;}
.frame:hover{outline:1px dashed var(--accent);}
.frame.selected{outline:2px solid var(--accent);outline-offset:2px;}
.frame-label{position:absolute;top:-22px;left:0;font-size:11px;font-family:var(--mono);font-weight:600;color:#475569;white-space:nowrap;pointer-events:none;}
.frame-resize{position:absolute;right:-5px;bottom:-5px;width:10px;height:10px;background:var(--accent);border-radius:2px;cursor:se-resize;}

/* ===== TEXT BOXES ===== */
.textbox{position:absolute;cursor:pointer;user-select:none;border:1.5px dashed transparent;padding:4px 8px;min-width:60px;min-height:24px;}
.textbox:hover{border-color:var(--accent);}
.textbox.selected{border-color:var(--accent);border-style:solid;}
.textbox-content{pointer-events:none;white-space:pre-wrap;word-break:break-word;}

/* ===== EDIT ===== */
.inline-edit{position:absolute;border-radius:6px;padding:5px 8px;font-size:12px;border:2px solid var(--accent);outline:none;text-align:center;background:rgba(255,255,255,.97);min-width:80px;font-family:var(--body);resize:none;z-index:50;}

/* ===== CONTEXT MENU ===== */
.ctx{position:fixed;background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:5px;min-width:190px;z-index:500;box-shadow:0 8px 32px rgba(0,0,0,.14);display:none;}
.ctx-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;font-size:12px;cursor:pointer;color:var(--text);}
.ctx-item:hover{background:var(--s2);}
.ctx-item.warn{color:#ef4444;}
.ctx-item.warn:hover{background:#fef2f2;}
.ctx-sep{height:1px;background:var(--border);margin:3px 0;}
.ctx-sub{font-size:10px;color:var(--muted);padding:4px 10px 2px;font-family:var(--mono);}

/* ===== NOTE PANEL ===== */
.side-panel{position:fixed;right:0;bottom:0;width:280px;background:var(--s1);border-left:1px solid var(--border);padding:14px;display:flex;flex-direction:column;gap:8px;transform:translateX(100%);transition:transform .22s;z-index:90;}
.side-panel.open{transform:translateX(0);}
.sp-title{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--text);display:flex;align-items:center;justify-content:space-between;}
.sp-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;}
.sp-field{width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:5px;font-size:12px;font-family:var(--body);background:var(--bg);color:var(--text);outline:none;resize:none;}
.sp-field:focus{border-color:var(--accent);}
.sp-btn{padding:7px 14px;border:none;border-radius:5px;background:var(--text);color:var(--s1);font-size:11px;cursor:pointer;font-family:var(--mono);}

/* ===== ZOOM / SELECTION INFO ===== */
.statusbar{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);background:var(--s1);border:1px solid var(--border);border-radius:6px;padding:4px 14px;font-family:var(--mono);font-size:11px;color:var(--muted);z-index:80;display:flex;gap:12px;align-items:center;}

/* ===== SELECTION BOX ===== */
.sel-box{position:absolute;border:1.5px dashed var(--accent);background:rgba(59,130,246,.06);pointer-events:none;z-index:10;}

/* ===== TOOLTIP ===== */
.tip{position:fixed;background:#1a1d2e;color:#fff;border-radius:5px;padding:3px 8px;font-size:11px;pointer-events:none;z-index:600;display:none;white-space:nowrap;}
</style>
</head>
<body>

<div class="toolbar" id="toolbar">
  <!-- ROW 1 : Navigation & modes -->
  <div class="tb-row">
    <div class="tb-logo">✦ NEXUS</div>
    <div class="tb-sep"></div>
    <!-- Undo/Redo -->
    <button class="tb-btn" onclick="undo()" title="Annuler (Ctrl+Z)">↩ Annuler</button>
    <button class="tb-btn" onclick="redo()" title="Rétablir (Ctrl+Y)">↪ Rétablir</button>
    <div class="tb-sep"></div>
    <!-- Modes -->
    <button class="tb-btn" id="btn-select" onclick="setMode('select')" title="Sélectionner (V)">↖ Sélect.</button>
    <button class="tb-btn" id="btn-pan" onclick="setMode('pan')" title="Naviguer sans sélectionner (H)">✋ Main</button>
    <button class="tb-btn" id="btn-add" onclick="setMode('add')" title="Ajouter nœud (N)">◉ Nœud</button>
    <button class="tb-btn" id="btn-frame" onclick="setMode('frame')" title="Dessiner un cadre (F)">▭ Cadre</button>
    <button class="tb-btn" id="btn-text" onclick="setMode('text')" title="Zone de texte (T)">T Texte</button>
    <button class="tb-btn" id="btn-connect" onclick="setMode('connect')" title="Connecter (C)">⟶ Lien</button>
    <div class="tb-sep"></div>
    <!-- Actions sélection -->
    <button class="tb-btn warn" onclick="deleteSelected()" title="Supprimer (Del)">🗑 Suppr.</button>
    <button class="tb-btn" onclick="duplicateSelected()" title="Dupliquer (Ctrl+D)">⧉ Dupli.</button>
    <button class="tb-btn" onclick="groupSelected()" title="Grouper">⊞ Grouper</button>
    <button class="tb-btn" onclick="bringForward()" title="Avant-plan">↑ Devant</button>
    <button class="tb-btn" onclick="sendBackward()" title="Arrière-plan">↓ Derrière</button>
    <div class="tb-sep"></div>
    <!-- Alignement -->
    <button class="tb-btn" onclick="alignNodes('left')" title="Aligner à gauche">⬤ G</button>
    <button class="tb-btn" onclick="alignNodes('center')" title="Centrer horizontalement">⬤ C</button>
    <button class="tb-btn" onclick="alignNodes('right')" title="Aligner à droite">⬤ D</button>
    <button class="tb-btn" onclick="alignNodes('top')" title="Aligner en haut">⬤ H</button>
    <button class="tb-btn" onclick="alignNodes('middle')" title="Centrer verticalement">⬤ M</button>
    <button class="tb-btn" onclick="alignNodes('bottom')" title="Aligner en bas">⬤ B</button>
    <div class="tb-sep"></div>
    <!-- Vue -->
    <button class="tb-btn" onclick="fitView()">⊡ Fit</button>
    <button class="tb-btn" onclick="zoomIn()">＋</button>
    <button class="tb-btn" onclick="zoomOut()">－</button>
    <button class="tb-btn" onclick="resetZoom()">100%</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" onclick="autoLayout()">⊞ Auto</button>
    <button class="tb-btn" onclick="resetMap()">↺ Reset</button>
    <button class="tb-btn" onclick="saveToFile()">💾 Export</button>
    <button class="tb-btn" onclick="loadFromFile()">📂 Import</button>
    <a class="home-link" href="index.html">← Accueil</a>
  </div>

  <!-- ROW 2 : Style de l'élément sélectionné -->
  <div class="tb-row" id="styleRow">
    <div class="tb-label">Forme:</div>
    <select class="tb-select" id="elShape" onchange="applyStyle('shape',this.value)">
      <option value="rounded">Arrondi</option>
      <option value="rect">Rectangle</option>
      <option value="circle">Cercle</option>
      <option value="pill">Pilule</option>
      <option value="diamond">Losange</option>
      <option value="hexagon">Hexagone</option>
    </select>
    <div class="tb-sep"></div>
    <div class="tb-label">Fond:</div>
    <input type="color" class="tb-color" id="elBg" value="#3b82f6" onchange="applyStyle('bg',this.value)">
    <div class="tb-label">Texte:</div>
    <input type="color" class="tb-color" id="elColor" value="#ffffff" onchange="applyStyle('color',this.value)">
    <div class="tb-label">Bordure:</div>
    <input type="color" class="tb-color" id="elBorder" value="#1e40af" onchange="applyStyle('borderColor',this.value)">
    <input class="tb-number" type="number" id="elBorderW" value="2" min="0" max="10" onchange="applyStyle('borderWidth',parseInt(this.value))" title="Épaisseur bordure">
    <div class="tb-sep"></div>
    <div class="tb-label">Opacité:</div>
    <input type="range" class="tb-range" id="elOpacity" min="10" max="100" value="100" oninput="applyStyle('opacity',parseInt(this.value));document.getElementById('elOpacityVal').textContent=this.value+'%'">
    <span id="elOpacityVal" style="font-size:10px;color:var(--muted);width:30px;">100%</span>
    <div class="tb-sep"></div>
    <div class="tb-label">Texte:</div>
    <select class="tb-select" id="elFont" onchange="applyStyle('fontFamily',this.value)">
      <option value="DM Sans">DM Sans</option>
      <option value="Syne">Syne</option>
      <option value="Georgia">Georgia</option>
      <option value="monospace">Mono</option>
      <option value="Arial">Arial</option>
    </select>
    <input class="tb-number" type="number" id="elFontSize" value="12" min="8" max="36" onchange="applyStyle('fontSize',parseInt(this.value))" title="Taille">
    <button class="tb-btn" id="elBold" onclick="toggleBold()" title="Gras">B</button>
    <button class="tb-btn" id="elItalic" onclick="toggleItalic()" title="Italique" style="font-style:italic;">I</button>
    <select class="tb-select" id="elAlign" onchange="applyStyle('textAlign',this.value)">
      <option value="center">≡ Centre</option>
      <option value="left">≡ Gauche</option>
      <option value="right">≡ Droite</option>
    </select>
    <div class="tb-sep"></div>
    <div class="tb-label">Ombre:</div>
    <input type="range" class="tb-range" id="elShadow" min="0" max="30" value="0" oninput="applyStyle('shadow',parseInt(this.value))">
    <div class="tb-sep"></div>
    <div class="tb-label">Lien:</div>
    <select class="tb-select" id="edgeStyle" onchange="applyEdgeStyle(this.value)">
      <option value="curve">Courbe</option>
      <option value="straight">Droite</option>
      <option value="elbow">Coudé</option>
    </select>
    <input type="color" class="tb-color" id="edgeColor" value="#94a3b8" onchange="applyEdgeColorSelected(this.value)">
    <input class="tb-number" type="number" id="edgeWidth" value="1.5" min="0.5" max="6" step="0.5" onchange="applyEdgeWidthSelected(parseFloat(this.value))">
    <select class="tb-select" id="edgeArrow" onchange="applyEdgeProp('arrow',this.value)">
      <option value="end">→ Flèche fin</option>
      <option value="both">↔ Double</option>
      <option value="none">— Sans</option>
    </select>
  </div>
</div>

<div class="canvas-wrap" id="canvasWrap">
  <div id="canvas">
    <svg id="svgLayer" style="position:absolute;top:0;left:0;pointer-events:none;overflow:visible;"></svg>
  </div>
</div>

<div class="sel-box" id="selBox" style="display:none;"></div>
<div class="ctx" id="ctxMenu"></div>
<div class="tip" id="tip"></div>
<div class="statusbar" id="statusbar">
  <span id="zoomLabel">100%</span>
  <span id="selLabel">Aucune sélection</span>
  <span id="modeLabel">Mode : Sélection</span>
</div>

<!-- NOTE PANEL -->
<div class="side-panel" id="sidePanel">
  <div class="sp-title">
    <span id="spTitle">Propriétés</span>
    <button class="sp-close" onclick="closeSidePanel()">✕</button>
  </div>

  <textarea class="sp-field" id="spNotes" placeholder="Notes, idées, statut, liens..." style="flex:1;min-height:120px;"></textarea>
  <input class="sp-field" id="spLink" placeholder="Lien URL (optionnel)" style="height:34px;"/>
  <div style="display:flex;gap:6px;">
    <button class="sp-btn" onclick="savePanel()" style="flex:1;">Enregistrer</button>
    <button class="sp-btn" style="background:var(--s2);color:var(--text);" onclick="closeSidePanel()">Fermer</button>
  </div>
</div>

// =========== INIT ===========
function init(){
  const saved=localStorage.getItem('nexus_mm2');
  if(saved){try{const d=JSON.parse(saved);nodes=d.nodes||[];edges=d.edges||[];frames=d.frames||[];textboxes=d.textboxes||[];}catch(e){loadDefault();}}
  else loadDefault();
  updateToolbarHeight();render();fitView();saveHistory();
}
function loadDefault(){const d=getNexusData();nodes=d.nodes;edges=d.edges;frames=d.frames;textboxes=d.textboxes;}

function updateToolbarHeight(){
  const tbH=document.getElementById('toolbar').offsetHeight;
  wrap.style.top=tbH+'px';
  document.getElementById('sidePanel').style.top=tbH+'px';
}

// =========== RENDER ===========
function render(){
  renderSVG();renderNodes();renderFrames();renderTextboxes();applyTransform();updateStatus();
}

function getNodeCenter(n){return{x:n.x+n.w/2,y:n.y+(n.shape==='circle'?n.h/2:n.h/2)};}

function renderSVG(){
  svg.innerHTML='';
  // defs for arrows
  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  svg.appendChild(defs);

  edges.forEach(e=>{
    const from=nodes.find(n=>n.id===e.from);
    const to=nodes.find(n=>n.id===e.to);
    if(!from||!to)return;
    const markerId='arr_'+e.id.replace(/[^a-z0-9]/gi,'_');
    const marker=document.createElementNS('http://www.w3.org/2000/svg','marker');
    marker.setAttribute('id',markerId);marker.setAttribute('markerWidth','8');marker.setAttribute('markerHeight','8');
    marker.setAttribute('refX','6');marker.setAttribute('refY','3');marker.setAttribute('orient','auto');
    const mp=document.createElementNS('http://www.w3.org/2000/svg','path');
    mp.setAttribute('d','M0,0 L0,6 L8,3 z');mp.setAttribute('fill',e.color||'#b0b8d0');
    if(e.arrow!=='none')marker.appendChild(mp);
    defs.appendChild(marker);

    const c1=getNodeCenter(from),c2=getNodeCenter(to);
    let d='';
    if(e.style==='straight'||e.style===undefined){
      d=`M${c1.x},${c1.y} L${c2.x},${c2.y}`;
    } else if(e.style==='elbow'){
      const mx=(c1.x+c2.x)/2;
      d=`M${c1.x},${c1.y} L${mx},${c1.y} L${mx},${c2.y} L${c2.x},${c2.y}`;
    } else {
      const dx=c2.x-c1.x,dy=c2.y-c1.y;
      d=`M${c1.x},${c1.y} C${c1.x+dx*0.4},${c1.y} ${c2.x-dx*0.4},${c2.y} ${c2.x},${c2.y}`;
    }
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',d);
    path.setAttribute('stroke',e.color||'#b0b8d0');
    path.setAttribute('stroke-width',e.width||1.5);
    path.setAttribute('fill','none');
    path.setAttribute('opacity','0.8');
    if(e.arrow!=='none')path.setAttribute('marker-end',`url(#${markerId})`);
    if(e.arrow==='both')path.setAttribute('marker-start',`url(#${markerId})`);
    if(selectedEdges.has(e.id))path.setAttribute('stroke-dasharray','6,3');
    path.dataset.eid=e.id;
    path.style.pointerEvents='stroke';
    path.style.cursor='pointer';
    path.addEventListener('click',ev=>{ev.stopPropagation();selectedEdges.clear();selectedEdges.add(e.id);selectedIds.clear();render();});
    path.addEventListener('contextmenu',ev=>{ev.preventDefault();ev.stopPropagation();selectedEdges.clear();selectedEdges.add(e.id);showEdgeCtx(ev.clientX,ev.clientY,e.id);});
    svg.appendChild(path);
  });
}

function getShapeStyle(shape){
  if(shape==='circle')return'border-radius:50%;';
  if(shape==='pill')return'border-radius:999px;';
  if(shape==='rect')return'border-radius:4px;';
  if(shape==='diamond')return'border-radius:4px;transform:rotate(45deg);';
  if(shape==='hexagon')return'clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%);border-radius:0;';
  if(shape==='pole')return'border-radius:12px;';
  return'border-radius:8px;';
}

function renderNodes(){
  cvs.querySelectorAll('.node').forEach(el=>{if(!nodes.find(n=>n.id===el.dataset.id))el.remove();});
  nodes.forEach(n=>{
    let el=cvs.querySelector(`.node[data-id="${n.id}"]`);
    if(!el){el=document.createElement('div');el.className='node';el.dataset.id=n.id;el.dataset.type='node';
      el.innerHTML=`<div class="node-label"></div><div class="node-sub"></div>`;
      cvs.appendChild(el);attachElEvents(el,'node');}
    el.style.cssText=`left:${n.x}px;top:${n.y}px;width:${n.w}px;min-height:${n.h}px;background:${n.bg};color:${n.color};border:${n.borderWidth||2}px solid ${n.borderColor||'transparent'};opacity:${(n.opacity||100)/100};box-shadow:${n.shadow?`0 ${n.shadow/3}px ${n.shadow}px rgba(0,0,0,0.2)`:''};${getShapeStyle(n.shape||'rounded')}text-align:${n.textAlign||'center'};`;
    el.classList.toggle('selected',selectedIds.has(n.id));
    const lbl=el.querySelector('.node-label');
    lbl.textContent=n.label;
    lbl.style.cssText=`font-size:${n.fontSize||12}px;font-family:${n.fontFamily||'DM Sans'};font-weight:${n.fontWeight||'normal'};font-style:${n.fontStyle||'normal'};`;
    const sub=el.querySelector('.node-sub');
    sub.textContent=n.sub||'';sub.style.display=n.sub?'block':'none';
  });
}

function renderFrames(){
  cvs.querySelectorAll('.frame').forEach(el=>{if(!frames.find(f=>f.id===el.dataset.id))el.remove();});
  frames.forEach(f=>{
    let el=cvs.querySelector(`.frame[data-id="${f.id}"]`);
    if(!el){el=document.createElement('div');el.className='frame';el.dataset.id=f.id;el.dataset.type='frame';
      el.innerHTML=`<div class="frame-label"></div><div class="frame-resize"></div>`;
      cvs.insertBefore(el,cvs.firstChild);attachElEvents(el,'frame');
      el.querySelector('.frame-resize').addEventListener('mousedown',ev=>{ev.stopPropagation();startResizeFrame(f.id,ev);});
    }
    el.style.cssText=`left:${f.x}px;top:${f.y}px;width:${f.w}px;height:${f.h}px;background:${f.bg||'rgba(59,130,246,0.06)'};border:${f.borderWidth||2}px solid ${f.borderColor||'#94a3b8'};border-radius:${f.radius||6}px;opacity:${(f.opacity||100)/100};`;
    el.classList.toggle('selected',selectedIds.has(f.id));
    el.querySelector('.frame-label').textContent=f.label||'';
  });
}

function renderTextboxes(){
  cvs.querySelectorAll('.textbox').forEach(el=>{if(!textboxes.find(t=>t.id===el.dataset.id))el.remove();});
  textboxes.forEach(t=>{
    let el=cvs.querySelector(`.textbox[data-id="${t.id}"]`);
    if(!el){el=document.createElement('div');el.className='textbox';el.dataset.id=t.id;el.dataset.type='textbox';
      el.innerHTML=`<div class="textbox-content"></div>`;
      cvs.appendChild(el);attachElEvents(el,'textbox');}
    el.style.cssText=`left:${t.x}px;top:${t.y}px;width:${t.w||200}px;opacity:${(t.opacity||100)/100};`;
    el.classList.toggle('selected',selectedIds.has(t.id));
    const c=el.querySelector('.textbox-content');
    c.textContent=t.text||'';
    c.style.cssText=`font-size:${t.fontSize||14}px;font-family:${t.fontFamily||'DM Sans'};font-weight:${t.fontWeight||'normal'};font-style:${t.fontStyle||'normal'};color:${t.color||'#1a1d2e'};text-align:${t.textAlign||'left'};`;
  });
}

function applyTransform(){
  cvs.style.transform=`translate(${panX}px,${panY}px) scale(${scale})`;
  document.getElementById('zoomLabel').textContent=Math.round(scale*100)+'%';
}

// =========== ATTACH EVENTS ===========
function attachElEvents(el,type){
  el.addEventListener('mousedown',ev=>{
    if(ev.button!==0)return;ev.stopPropagation();
    const id=el.dataset.id;
    if(mode==='connect'){
      if(!connectStart){connectStart=id;connectType=type;el.style.outline='2px dashed #3b82f6';}
      else if(connectStart!==id){addEdge(connectStart,id);cvs.querySelectorAll('.node,.frame').forEach(e=>e.style.outline='');connectStart=null;saveHistory();}
      return;
    }
    if(!ev.shiftKey){selectedIds.clear();selectedEdges.clear();}
    selectedIds.add(id);
    dragId=id;dragType=type;
    const rect=el.getBoundingClientRect();
    dragOffset={x:(ev.clientX-rect.left)/scale,y:(ev.clientY-rect.top)/scale};
    updateStyleBar();render();
  });
  el.addEventListener('dblclick',ev=>{ev.stopPropagation();startInlineEdit(el.dataset.id,el.dataset.type,el);});
  el.addEventListener('contextmenu',ev=>{ev.preventDefault();ev.stopPropagation();selectedIds.clear();selectedIds.add(el.dataset.id);showNodeCtx(ev.clientX,ev.clientY,el.dataset.id,type);render();});
}

// =========== INLINE EDIT ===========
function startInlineEdit(id,type,el){
  let item=getItem(id,type);if(!item)return;
  const ta=document.createElement('textarea');ta.className='inline-edit';
  if(type==='textbox')ta.value=item.text||'';
  else ta.value=item.label+(item.sub?'\n'+item.sub:'');
  ta.style.left=item.x+'px';ta.style.top=item.y+'px';ta.style.width=item.w+'px';
  ta.style.color=type==='textbox'?item.color:item.color;
  ta.style.background=type==='textbox'?'rgba(255,255,255,0.97)':item.bg;
  cvs.appendChild(ta);el.style.visibility='hidden';ta.focus();ta.select();
  const done=()=>{
    const lines=ta.value.split('\n');
    if(type==='textbox'){item.text=ta.value;}
    else{item.label=lines[0]||item.label;item.sub=lines[1]||'';}
    ta.remove();el.style.visibility='visible';saveHistory();render();
  };
  ta.addEventListener('blur',done);
  ta.addEventListener('keydown',ev=>{if(ev.key==='Enter'&&!ev.shiftKey&&type!=='textbox'){ev.preventDefault();done();}if(ev.key==='Escape')done();});
}

// =========== CANVAS EVENTS ===========
let drawingFrameRect={x:0,y:0,w:0,h:0};
wrap.addEventListener('mousedown',ev=>{
  if(ev.button!==0)return;
  closeCtxMenu();
  if(mode==='pan'){isPanning=true;panStart={x:ev.clientX-panX,y:ev.clientY-panY};wrap.classList.add('grabbing');return;}
  if(mode==='add'){const p=s2c(ev.clientX,ev.clientY);addNode(p.x-75,p.y-22);return;}
  if(mode==='text'){const p=s2c(ev.clientX,ev.clientY);addTextbox(p.x,p.y);return;}
  if(mode==='frame'){
    drawingFrame=true;frameStart=s2c(ev.clientX,ev.clientY);
    frameEl=document.createElement('div');
    frameEl.style.cssText=`position:absolute;border:2px dashed #3b82f6;background:rgba(59,130,246,0.05);pointer-events:none;z-index:5;`;
    cvs.appendChild(frameEl);return;
  }
  if(ev.target===wrap||ev.target===cvs||ev.target===svg){
    if(mode==='select'&&!ev.shiftKey){
      selBoxActive=true;selBoxStart=s2c(ev.clientX,ev.clientY);
      document.getElementById('selBox').style.display='block';
    }
    if(!ev.shiftKey){selectedIds.clear();selectedEdges.clear();render();}
    isPanning=true;panStart={x:ev.clientX-panX,y:ev.clientY-panY};
    wrap.classList.add('grabbing');
  }
});

window.addEventListener('mousemove',ev=>{
  if(drawingFrame){
    const p=s2c(ev.clientX,ev.clientY);
    const x=Math.min(p.x,frameStart.x),y=Math.min(p.y,frameStart.y);
    const w=Math.abs(p.x-frameStart.x),h=Math.abs(p.y-frameStart.y);
    drawingFrameRect={x,y,w,h};
    if(frameEl){frameEl.style.left=x+'px';frameEl.style.top=y+'px';frameEl.style.width=w+'px';frameEl.style.height=h+'px';}
    return;
  }
  if(selBoxActive&&!dragId){
    const p=s2c(ev.clientX,ev.clientY);
    const x=Math.min(p.x,selBoxStart.x),y=Math.min(p.y,selBoxStart.y);
    const w=Math.abs(p.x-selBoxStart.x),h=Math.abs(p.y-selBoxStart.y);
    const b=document.getElementById('selBox');
    const rx=panX+x*scale,ry=panY+y*scale;
    b.style.cssText=`display:block;left:${rx}px;top:${ry+document.getElementById('toolbar').offsetHeight}px;width:${w*scale}px;height:${h*scale}px;`;
    nodes.forEach(n=>{if(n.x>=x&&n.y>=y&&n.x+n.w<=x+w&&n.y+n.h<=y+h)selectedIds.add(n.id);});
    return;
  }
  if(isPanning&&!dragId){panX=ev.clientX-panStart.x;panY=ev.clientY-panStart.y;applyTransform();}
  if(dragId){
    const item=getItem(dragId,dragType);if(!item)return;
    const p=s2c(ev.clientX,ev.clientY);
    item.x=p.x-dragOffset.x;item.y=p.y-dragOffset.y;render();
  }
});

window.addEventListener('mouseup',ev=>{
  if(drawingFrame){
    drawingFrame=false;if(frameEl){frameEl.remove();frameEl=null;}
    if(drawingFrameRect.w>30&&drawingFrameRect.h>30)addFrame(drawingFrameRect);
    return;
  }
  selBoxActive=false;document.getElementById('selBox').style.display='none';
  if(dragId)saveHistory();
  isPanning=false;dragId=null;dragType=null;
  wrap.classList.remove('grabbing');
  if(mode==='pan')wrap.classList.add('panning');
});

wrap.addEventListener('wheel',ev=>{
  ev.preventDefault();
  const delta=ev.deltaY>0?0.9:1.1;
  const p=s2c(ev.clientX,ev.clientY);
  scale=Math.min(Math.max(scale*delta,0.05),5);
  panX=ev.clientX-p.x*scale;panY=ev.clientY-p.y*scale;applyTransform();
},{passive:false});

// =========== RESIZE FRAME ===========
let resizingFrame=null,resizeStart={x:0,y:0,w:0,h:0};
function startResizeFrame(id,ev){
  resizingFrame=id;const f=frames.find(x=>x.id===id);
  resizeStart={x:ev.clientX,y:ev.clientY,w:f.w,h:f.h};
  const mm=e=>{const f2=frames.find(x=>x.id===resizingFrame);if(!f2)return;f2.w=Math.max(80,resizeStart.w+(e.clientX-resizeStart.x)/scale);f2.h=Math.max(60,resizeStart.h+(e.clientY-resizeStart.y)/scale);render();};
  const mu=()=>{resizingFrame=null;saveHistory();window.removeEventListener('mousemove',mm);window.removeEventListener('mouseup',mu);};
  window.addEventListener('mousemove',mm);window.addEventListener('mouseup',mu);
}

// =========== UTILS ===========
function s2c(sx,sy){return{x:(sx-panX)/scale,y:(sy-panY-document.getElementById('toolbar').offsetHeight)/scale};}
function genId(){return 'el_'+(++idCounter)+'_'+Date.now();}
function getItem(id,type){
  if(type==='node')return nodes.find(n=>n.id===id);
  if(type==='frame')return frames.find(f=>f.id===id);
  if(type==='textbox')return textboxes.find(t=>t.id===id);
  return nodes.find(n=>n.id===id)||frames.find(f=>f.id===id)||textboxes.find(t=>t.id===id);
}

// =========== ADD ELEMENTS ===========
function addNode(x,y,label='Nouveau nœud',parentId=null){
  const id=genId();
  const n={id,x,y,w:150,h:45,label,sub:'',bg:'#64748b',color:'#ffffff',shape:'rounded',fontSize:12,notes:'',opacity:100,borderColor:'transparent',borderWidth:2,shadow:0,fontFamily:'DM Sans',fontWeight:'normal',fontStyle:'normal',textAlign:'center',link:''};
  nodes.push(n);
  if(parentId)addEdge(parentId,id);
  saveHistory();render();
  setTimeout(()=>{const el=cvs.querySelector(`.node[data-id="${id}"]`);if(el)startInlineEdit(id,'node',el);},50);
  return id;
}

function addFrame(rect){
  const id=genId();
  frames.push({id,x:rect.x,y:rect.y,w:rect.w,h:rect.h,label:'Cadre',bg:'rgba(148,163,184,0.08)',borderColor:'#94a3b8',borderWidth:2,opacity:100,radius:6});
  saveHistory();render();
}

function addTextbox(x,y){
  const id=genId();
  textboxes.push({id,x,y,w:200,h:40,text:'Texte libre',color:'#1a1d2e',fontSize:14,fontFamily:'DM Sans',fontWeight:'normal',fontStyle:'normal',textAlign:'left',opacity:100});
  saveHistory();render();
  setTimeout(()=>{const el=cvs.querySelector(`.textbox[data-id="${id}"]`);if(el)startInlineEdit(id,'textbox',el);},50);
}

function addEdge(from,to){
  if(!edges.find(e=>e.from===from&&e.to===to)){
    edges.push({id:`e_${from}_${to}_${Date.now()}`,from,to,style:'curve',color:'#b0b8d0',width:1.5,arrow:'end'});
    render();
  }
}

// =========== DELETE ===========
function deleteSelected(){
  selectedIds.forEach(id=>{
    nodes=nodes.filter(n=>n.id!==id);
    frames=frames.filter(f=>f.id!==id);
    textboxes=textboxes.filter(t=>t.id!==id);
    edges=edges.filter(e=>e.from!==id&&e.to!==id);
  });
  selectedEdges.forEach(eid=>edges=edges.filter(e=>e.id!==eid));
  selectedIds.clear();selectedEdges.clear();saveHistory();render();
}

function deleteItem(id){selectedIds.clear();selectedIds.add(id);deleteSelected();}

// =========== DUPLICATE ===========
function duplicateSelected(){
  const newIds=[];
  selectedIds.forEach(id=>{
    const n=nodes.find(x=>x.id===id);
    if(n){const nid=genId();nodes.push({...n,id:nid,x:n.x+20,y:n.y+20});newIds.push(nid);}
    const f=frames.find(x=>x.id===id);
    if(f){const nid=genId();frames.push({...f,id:nid,x:f.x+20,y:f.y+20});newIds.push(nid);}
    const t=textboxes.find(x=>x.id===id);
    if(t){const nid=genId();textboxes.push({...t,id:nid,x:t.x+20,y:t.y+20});newIds.push(nid);}
  });
  selectedIds.clear();newIds.forEach(id=>selectedIds.add(id));saveHistory();render();
}

// =========== Z-ORDER ===========
function bringForward(){
  selectedIds.forEach(id=>{
    const i=nodes.findIndex(n=>n.id===id);if(i>=0&&i<nodes.length-1){[nodes[i],nodes[i+1]]=[nodes[i+1],nodes[i]];}
  });render();
}
function sendBackward(){
  selectedIds.forEach(id=>{
    const i=nodes.findIndex(n=>n.id===id);if(i>0){[nodes[i-1],nodes[i]]=[nodes[i],nodes[i-1]];}
  });render();
}

// =========== ALIGN ===========
function alignNodes(dir){
  const sel=[...selectedIds].map(id=>nodes.find(n=>n.id===id)).filter(Boolean);
  if(sel.length<2)return;
  if(dir==='left'){const x=Math.min(...sel.map(n=>n.x));sel.forEach(n=>n.x=x);}
  if(dir==='right'){const x=Math.max(...sel.map(n=>n.x+n.w));sel.forEach(n=>n.x=x-n.w);}
  if(dir==='center'){const cx=(Math.min(...sel.map(n=>n.x))+Math.max(...sel.map(n=>n.x+n.w)))/2;sel.forEach(n=>n.x=cx-n.w/2);}
  if(dir==='top'){const y=Math.min(...sel.map(n=>n.y));sel.forEach(n=>n.y=y);}
  if(dir==='bottom'){const y=Math.max(...sel.map(n=>n.y+n.h));sel.forEach(n=>n.y=y-n.h);}
  if(dir==='middle'){const cy=(Math.min(...sel.map(n=>n.y))+Math.max(...sel.map(n=>n.y+n.h)))/2;sel.forEach(n=>n.y=cy-n.h/2);}
  saveHistory();render();
}

// =========== GROUP ===========
function groupSelected(){
  const sel=[...selectedIds].map(id=>nodes.find(n=>n.id===id)).filter(Boolean);
  if(sel.length<2)return;
  const x=Math.min(...sel.map(n=>n.x))-16,y=Math.min(...sel.map(n=>n.y))-32;
  const w=Math.max(...sel.map(n=>n.x+n.w))-x+16,h=Math.max(...sel.map(n=>n.y+n.h))-y+16;
  const id=genId();
  frames.push({id,x,y,w,h,label:'Groupe',bg:'rgba(100,116,139,0.05)',borderColor:'#94a3b8',borderWidth:1.5,opacity:100,radius:8});
  saveHistory();render();
}

// =========== STYLE BAR ===========
function updateStyleBar(){
  if(!selectedIds.size)return;
  const id=[...selectedIds][0];
  const n=nodes.find(x=>x.id===id);
  const f=frames.find(x=>x.id===id);
  const t=textboxes.find(x=>x.id===id);
  const item=n||f||t;if(!item)return;
  if(n){document.getElementById('elShape').value=n.shape||'rounded';document.getElementById('elBg').value=n.bg||'#3b82f6';}
  document.getElementById('elColor').value=item.color||'#ffffff';
  document.getElementById('elBorder').value=item.borderColor||'#1e40af';
  document.getElementById('elBorderW').value=item.borderWidth||2;
  document.getElementById('elOpacity').value=item.opacity||100;
  document.getElementById('elOpacityVal').textContent=(item.opacity||100)+'%';
  document.getElementById('elFont').value=item.fontFamily||'DM Sans';
  document.getElementById('elFontSize').value=item.fontSize||12;
  document.getElementById('elBold').classList.toggle('active',item.fontWeight==='bold');
  document.getElementById('elItalic').classList.toggle('active',item.fontStyle==='italic');
  document.getElementById('elAlign').value=item.textAlign||'center';
  document.getElementById('elShadow').value=item.shadow||0;
}

function applyStyle(prop,val){
  selectedIds.forEach(id=>{
    const item=nodes.find(n=>n.id===id)||frames.find(f=>f.id===id)||textboxes.find(t=>t.id===id);
    if(item)item[prop]=val;
  });
  render();
}

function toggleBold(){
  selectedIds.forEach(id=>{
    const item=nodes.find(n=>n.id===id)||textboxes.find(t=>t.id===id);
    if(item)item.fontWeight=item.fontWeight==='bold'?'normal':'bold';
  });
  document.getElementById('elBold').classList.toggle('active');render();
}

function toggleItalic(){
  selectedIds.forEach(id=>{
    const item=nodes.find(n=>n.id===id)||textboxes.find(t=>t.id===id);
    if(item)item.fontStyle=item.fontStyle==='italic'?'normal':'italic';
  });
  document.getElementById('elItalic').classList.toggle('active');render();
}

// =========== EDGE STYLE ===========
function applyEdgeStyle(val){selectedEdges.forEach(eid=>{const e=edges.find(x=>x.id===eid);if(e)e.style=val;});render();}
function applyEdgeColorSelected(val){selectedEdges.forEach(eid=>{const e=edges.find(x=>x.id===eid);if(e)e.color=val;});render();}
function applyEdgeWidthSelected(val){selectedEdges.forEach(eid=>{const e=edges.find(x=>x.id===eid);if(e)e.width=val;});render();}
function applyEdgeProp(prop,val){selectedEdges.forEach(eid=>{const e=edges.find(x=>x.id===eid);if(e)e[prop]=val;});render();}

// =========== CONTEXT MENUS ===========
function showNodeCtx(x,y,id,type){
  const menu=document.getElementById('ctxMenu');
  menu.style.cssText=`display:block;left:${x}px;top:${y}px;`;
  menu.innerHTML=`
    <div class="ctx-sub">NŒUD</div>
    <div class="ctx-item" onclick="openSidePanel('${id}','${type}')">📝 Notes & propriétés</div>
    <div class="ctx-item" onclick="startConnectFrom('${id}')">⟶ Connecter à...</div>
    <div class="ctx-item" onclick="addChildNode('${id}')">+ Ajouter enfant</div>
    <div class="ctx-sep"></div>
    <div class="ctx-item" onclick="duplicateSelected()">⧉ Dupliquer</div>
    <div class="ctx-item" onclick="bringForward()">↑ Mettre devant</div>
    <div class="ctx-item" onclick="sendBackward()">↓ Mettre derrière</div>
    <div class="ctx-sep"></div>
    <div class="ctx-item warn" onclick="deleteItem('${id}')">🗑 Supprimer</div>
    ${type==='node'?`<div class="ctx-item warn" onclick="deleteWithEdges('${id}')">🗑 Suppr. + liens</div>`:''}
  `;
}

function showEdgeCtx(x,y,eid){
  const menu=document.getElementById('ctxMenu');
  menu.style.cssText=`display:block;left:${x}px;top:${y}px;`;
  menu.innerHTML=`
    <div class="ctx-sub">LIEN</div>
    <div class="ctx-item warn" onclick="deleteEdge('${eid}')">🗑 Supprimer ce lien</div>
  `;
}

function deleteEdge(eid){edges=edges.filter(e=>e.id!==eid);selectedEdges.clear();saveHistory();render();}
function deleteWithEdges(id){deleteItem(id);}
function closeCtxMenu(){document.getElementById('ctxMenu').style.display='none';}
document.addEventListener('click',e=>{if(!document.getElementById('ctxMenu').contains(e.target))closeCtxMenu();});

function startConnectFrom(id){closeCtxMenu();connectStart=id;setMode('connect');const el=cvs.querySelector(`.node[data-id="${id}"],.frame[data-id="${id}"]`);if(el)el.style.outline='2px dashed #3b82f6';}
function addChildNode(parentId){closeCtxMenu();const p=nodes.find(n=>n.id===parentId);if(!p)return;addNode(p.x+p.w+50,p.y,'Enfant',parentId);}

// =========== SIDE PANEL ===========
function openSidePanel(id,type){
  closeCtxMenu();
  panelId=id;panelType=type;
  const item=getItem(id,type);if(!item)return;
  document.getElementById('spTitle').textContent='Propriétés : '+(item.label||item.text||'').slice(0,30);
  document.getElementById('spLabel').value=type==='textbox'?item.text:item.label||'';
  document.getElementById('spSub').value=item.sub||'';document.getElementById('spSub').style.display=type==='textbox'?'none':'block';
  document.getElementById('spNotes').value=item.notes||'';
  document.getElementById('spLink').value=item.link||'';
  document.getElementById('sidePanel').classList.add('open');
}
function savePanel(){
  if(!panelId)return;
  const item=getItem(panelId,panelType);if(!item)return;
  if(panelType==='textbox')item.text=document.getElementById('spLabel').value;
  else{item.label=document.getElementById('spLabel').value;item.sub=document.getElementById('spSub').value;}
  item.notes=document.getElementById('spNotes').value;
  item.link=document.getElementById('spLink').value;
  saveHistory();render();
}
function closeSidePanel(){document.getElementById('sidePanel').classList.remove('open');panelId=null;}

// =========== MODE ===========
function setMode(m){
  mode=m;
  if(m!=='connect'){connectStart=null;cvs.querySelectorAll('.node,.frame').forEach(el=>el.style.outline='');}
  ['select','pan','add','frame','text','connect'].forEach(id=>{
    const btn=document.getElementById('btn-'+id);if(btn)btn.classList.toggle('active',id===m);
  });
  wrap.className='canvas-wrap';
  if(m==='add'||m==='text')wrap.classList.add('adding-node');
  if(m==='frame')wrap.classList.add('adding-frame');
  if(m==='connect')wrap.classList.add('connecting');
  if(m==='pan')wrap.classList.add('panning');
  document.getElementById('modeLabel').textContent='Mode : '+{select:'Sélection',pan:'Navigation',add:'Nœud',frame:'Cadre',text:'Texte',connect:'Connexion'}[m];
}

// =========== VIEW ===========
function getMapBounds(){
  const all=[...nodes,...frames,...textboxes];
  if(!all.length)return{x:0,y:0,w:2400,h:1600};
  const xs=all.map(n=>n.x),ys=all.map(n=>n.y);
  return{x:Math.min(...xs),y:Math.min(...ys),w:Math.max(...all.map(n=>n.x+(n.w||100)))-Math.min(...xs),h:Math.max(...all.map(n=>n.y+(n.h||45)))-Math.min(...ys)};
}
function fitView(){
  const b=getMapBounds(),tbH=document.getElementById('toolbar').offsetHeight;
  const ww=wrap.offsetWidth,wh=wrap.offsetHeight;
  scale=Math.min((ww-80)/(b.w+100),(wh-80)/(b.h+100),1);
  panX=40-b.x*scale;panY=40-b.y*scale;applyTransform();
}
function zoomIn(){scale=Math.min(scale*1.2,5);applyTransform();}
function zoomOut(){scale=Math.max(scale*0.8,0.05);applyTransform();}
function resetZoom(){scale=1;applyTransform();}

function updateStatus(){
  const n=selectedIds.size;
  document.getElementById('selLabel').textContent=n?`${n} élément(s) sélectionné(s)`:'Aucune sélection';
}

// =========== AUTO LAYOUT ===========
function autoLayout(){
  const center=nodes.find(n=>n.id==='center');if(!center)return;
  const poles=edges.filter(e=>e.from==='center').map(e=>nodes.find(n=>n.id===e.to)).filter(Boolean);
  const R=280;
  poles.forEach((pole,i)=>{
    const angle=(Math.PI*2/poles.length)*i-Math.PI/2;
    pole.x=center.x+center.w/2+Math.cos(angle)*R-pole.w/2;
    pole.y=center.y+center.h/2+Math.sin(angle)*R-pole.h/2;
    const children=edges.filter(e=>e.from===pole.id).map(e=>nodes.find(n=>n.id===e.to)).filter(Boolean);
    const cStep=children.length>1?(Math.PI*0.7)/(children.length-1):0;
    const cAngle=angle-Math.PI*0.35;
    children.forEach((child,j)=>{
      const ca=cAngle+j*cStep;
      child.x=pole.x+pole.w/2+Math.cos(ca)*200-child.w/2;
      child.y=pole.y+pole.h/2+Math.sin(ca)*200-child.h/2;
    });
  });
  saveHistory();render();fitView();
}

// =========== HISTORY ===========
function saveHistory(){
  history=history.slice(0,historyIdx+1);
  history.push(JSON.stringify({nodes,edges,frames,textboxes}));
  historyIdx++;if(history.length>80)history.shift();
  localStorage.setItem('nexus_mm2',history[historyIdx]);
}
function undo(){if(historyIdx>0){historyIdx--;const d=JSON.parse(history[historyIdx]);nodes=d.nodes;edges=d.edges;frames=d.frames||[];textboxes=d.textboxes||[];render();}}
function redo(){if(historyIdx<history.length-1){historyIdx++;const d=JSON.parse(history[historyIdx]);nodes=d.nodes;edges=d.edges;frames=d.frames||[];textboxes=d.textboxes||[];render();}}

// =========== SAVE/LOAD ===========
function saveToFile(){
  const data=JSON.stringify({nodes,edges,frames,textboxes},null,2);
  const a=document.createElement('a');a.href='data:application/json;charset=utf-8,'+encodeURIComponent(data);
  a.download='nexus_mindmap_'+new Date().toISOString().slice(0,10)+'.json';a.click();
}
function loadFromFile(){
  const input=document.createElement('input');input.type='file';input.accept='.json';
  input.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{const d=JSON.parse(ev.target.result);nodes=d.nodes;edges=d.edges;frames=d.frames||[];textboxes=d.textboxes||[];saveHistory();render();fitView();};r.readAsText(f);};input.click();
}
function resetMap(){if(!confirm('Réinitialiser la mindmap NEXUS ?'))return;loadDefault();saveHistory();render();fitView();}

// =========== KEYBOARD ===========
document.addEventListener('keydown',ev=>{
  const tag=document.activeElement.tagName;
  if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT')return;
  if((ev.ctrlKey||ev.metaKey)&&ev.key==='z'){ev.preventDefault();undo();}
  if((ev.ctrlKey||ev.metaKey)&&ev.key==='y'){ev.preventDefault();redo();}
  if((ev.ctrlKey||ev.metaKey)&&ev.key==='d'){ev.preventDefault();duplicateSelected();}
  if((ev.ctrlKey||ev.metaKey)&&ev.key==='a'){ev.preventDefault();nodes.forEach(n=>selectedIds.add(n.id));render();}
  if(ev.key==='Delete'||ev.key==='Backspace')deleteSelected();
  if(ev.key==='Escape'){setMode('select');closeSidePanel();closeCtxMenu();}
  if(ev.key==='v'||ev.key==='V')setMode('select');
  if(ev.key==='h'||ev.key==='H')setMode('pan');
  if(ev.key==='n'||ev.key==='N')setMode('add');
  if(ev.key==='f'||ev.key==='F')setMode('frame');
  if(ev.key==='t'||ev.key==='T')setMode('text');
  if(ev.key==='c'||ev.key==='C')setMode('connect');
  // Arrow keys for nudge
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(ev.key)){
    const d=ev.shiftKey?10:1;
    selectedIds.forEach(id=>{const item=getItem(id,null);if(!item)return;
      if(ev.key==='ArrowLeft')item.x-=d;if(ev.key==='ArrowRight')item.x+=d;
      if(ev.key==='ArrowUp')item.y-=d;if(ev.key==='ArrowDown')item.y+=d;
    });render();
  }
});

// =========== START ===========
init();setMode('select');
window.addEventListener('resize',()=>{updateToolbarHeight();fitView();});
</script>
