<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Veille</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#08090c;--s1:#0e1016;--s2:#14161f;--s3:#1a1d28;--border:#232635;
  --text:#e4e8f5;--muted:#5a6080;--dim:#2a2e40;
  --accent:#e8f04a;--accent-d:rgba(232,240,74,0.08);
  --green:#3dffa0;--green-d:rgba(61,255,160,0.08);
  --red:#ff5566;--mono:'Space Mono',monospace;--body:'Space Grotesk',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--body);}
.shell{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.topbar{display:flex;align-items:center;gap:1rem;padding:.85rem 1.5rem;background:var(--s1);border-bottom:1px solid var(--border);flex-shrink:0;}
.logo{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--accent);}
.logo-sub{font-size:10px;color:var(--muted);font-family:var(--mono);}
.topbar-r{margin-left:auto;display:flex;align-items:center;gap:10px;}
.date-badge{font-family:var(--mono);font-size:10px;color:var(--muted);background:var(--s2);border:1px solid var(--border);border-radius:4px;padding:3px 8px;}
.status{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--green);font-family:var(--mono);}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.nav{display:flex;background:var(--s1);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
.nav::-webkit-scrollbar{display:none;}
.nav-btn{padding:.65rem 1.2rem;border:none;background:transparent;color:var(--muted);font-family:var(--mono);font-size:10px;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .15s;letter-spacing:.04em;}
.nav-btn:hover{color:var(--text);}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.main{flex:1;overflow-y:auto;padding:1.5rem;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.main::-webkit-scrollbar{width:3px;}
.main::-webkit-scrollbar-thumb{background:var(--border);}
.view{display:none;}.view.active{display:block;}
.sec-title{font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:.6rem;display:flex;align-items:center;gap:8px;}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border);}
.theme-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem;}
.tpill{padding:4px 11px;border:1px solid var(--border);border-radius:20px;font-size:11px;cursor:pointer;background:transparent;color:var(--muted);font-family:var(--mono);transition:all .15s;}
.tpill.on{border-color:var(--accent);color:var(--accent);background:var(--accent-d);}
.period-info{font-family:var(--mono);font-size:10px;color:var(--muted);padding:6px 10px;background:var(--s2);border-radius:6px;margin-bottom:10px;}
.brief-header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.gen-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;background:var(--accent-d);border:1px solid var(--accent);border-radius:6px;color:var(--accent);font-family:var(--mono);font-size:11px;cursor:pointer;transition:all .2s;font-weight:700;}
.gen-btn:hover{background:var(--accent);color:var(--bg);}
.gen-btn:disabled{opacity:.4;cursor:not-allowed;}
.gmail-btn{padding:7px 14px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);font-family:var(--mono);font-size:10px;cursor:pointer;}
.gmail-btn:hover{border-color:var(--accent);color:var(--accent);}
.spin{display:inline-block;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.brief-content{display:flex;flex-direction:column;gap:8px;}
.bsec{background:var(--s1);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.bsec-head{display:flex;align-items:center;gap:8px;padding:.75rem 1rem;cursor:pointer;transition:background .15s;}
.bsec-head:hover{background:var(--s2);}
.bsec-icon{font-size:15px;flex-shrink:0;}
.bsec-label{font-family:var(--mono);font-size:11px;font-weight:700;flex:1;}
.bsec-actions{display:flex;align-items:center;gap:6px;}
.star-btn{padding:2px 7px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--muted);font-family:var(--mono);font-size:9px;cursor:pointer;transition:all .15s;}
.star-btn:hover,.star-btn.on{border-color:var(--accent);color:var(--accent);background:var(--accent-d);}
.bsec-body{padding:.85rem 1rem;font-size:13px;line-height:1.8;color:var(--text);display:none;border-top:1px solid var(--border);}
.bsec-body.open{display:block;}
.bsec-body strong{font-weight:500;}
.bsec-body a{color:var(--accent);text-decoration:none;}
.bsec-body a:hover{text-decoration:underline;}
.skel{background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:4px;height:13px;margin-bottom:7px;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.empty{text-align:center;padding:3rem 1rem;color:var(--muted);font-family:var(--mono);font-size:11px;}
.hist-item{padding:10px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.hist-date{font-family:var(--mono);font-size:10px;color:var(--muted);}
.hist-themes{font-size:13px;}
.hist-period{font-family:var(--mono);font-size:9px;color:var(--dim);margin-left:auto;}
.hist-open{padding:3px 8px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--muted);font-family:var(--mono);font-size:9px;cursor:pointer;}
.hist-open:hover{border-color:var(--accent);color:var(--accent);}
.hist-del{background:none;border:none;color:var(--dim);cursor:pointer;font-size:12px;}
.hist-del:hover{color:var(--red);}
.saved-card{background:var(--s1);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:8px;}
.saved-head{display:flex;align-items:center;gap:8px;padding:.7rem 1rem;border-bottom:1px solid var(--border);}
.saved-meta{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:1px;}
.saved-body{padding:.75rem 1rem;font-size:13px;line-height:1.8;}
.saved-body a{color:var(--accent);text-decoration:none;}
.saved-body a:hover{text-decoration:underline;}
.saved-del{background:none;border:none;color:var(--dim);cursor:pointer;font-size:12px;margin-left:auto;}
.saved-del:hover{color:var(--red);}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div><div class="logo">VEILLE // v2.0</div><div class="logo-sub">Brief quotidien · 8 thèmes · Historique</div></div>
    <div class="topbar-r">
      <div class="date-badge" id="topDate"></div>
      <div class="status"><div class="sdot"></div>EN LIGNE</div>
    </div>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="showView('brief')">BRIEF DU JOUR</button>
    <button class="nav-btn" onclick="showView('historique')">HISTORIQUE</button>
    <button class="nav-btn" onclick="showView('saved')">SAUVEGARDÉS <span id="savedCount"></span></button>
    <button class="nav-btn" onclick="window.open('https://mail.google.com','_blank')">GMAIL ↗</button>
  </div>
  <div class="main">

    <div class="view active" id="view-brief">
      <div class="brief-header">
        <div class="period-info" id="periodInfo" style="flex:1;margin-bottom:0;"></div>
        <button class="gen-btn" id="genBtn" onclick="generateBrief()"><span id="genIcon">⚡</span> GÉNÉRER</button>
        <button class="gmail-btn" onclick="window.open('https://mail.google.com','_blank')">📬 GMAIL ↗</button>
      </div>
      <div class="sec-title">THÈMES ACTIFS</div>
      <div class="theme-pills" id="themePills"></div>
      <div id="briefContent"><div class="empty">📡<br><br>Clique sur "Générer" pour recevoir ton brief du jour.<br>L'agent ne couvre que les actus depuis la dernière génération.</div></div>
    </div>

    <div class="view" id="view-historique">
      <div class="sec-title">BRIEFS PRÉCÉDENTS</div>
      <div id="histList"></div>
    </div>

    <div class="view" id="view-saved">
      <div class="sec-title">ACTUALITÉS SAUVEGARDÉES</div>
      <div id="savedList"></div>
    </div>

  </div>
</div>
<script>
const API_KEY='TA_CLE_API';
const THEMES=[
  {id:'esp',label:'Espagne',icon:'🇪🇸',color:'#e8a020'},
  {id:'fra',label:'France',icon:'🇫🇷',color:'#4488ff'},
  {id:'aus',label:'Australie / FIFO',icon:'⛏',color:'#33ddcc'},
  {id:'clim',label:'Clim / Transport',icon:'❄',color:'#55cc77'},
  {id:'eur',label:'Marchés EUR',icon:'📈',color:'#e8e84a'},
  {id:'cryp',label:'Crypto',icon:'🪙',color:'#b066ff'},
  {id:'geo',label:'Géopolitique mondiale',icon:'🌍',color:'#ff5566'},
  {id:'hist',label:'Histoire & Découvertes',icon:'🔭',color:'#d4aa66'},
];
let activeThemes=new Set(THEMES.map(t=>t.id));
let store=JSON.parse(localStorage.getItem('veille_v2')||'{"briefs":[],"saved":[]}');
function vsave(){localStorage.setItem('veille_v2',JSON.stringify(store));}

document.getElementById('topDate').textContent=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});

function showView(v){
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  const map={brief:'BRIEF',historique:'HIST',saved:'SAUV'};
  document.querySelectorAll('.nav-btn').forEach(b=>{if(b.textContent.trim().startsWith(map[v]||'__'))b.classList.add('active');});
  if(v==='historique')renderHist();
  if(v==='saved')renderSaved();
}

function buildThemePills(){
  document.getElementById('themePills').innerHTML=THEMES.map(t=>`
    <button class="tpill on" id="vpill_${t.id}" onclick="toggleTheme('${t.id}')">${t.icon} ${t.label}</button>`).join('');
}

function toggleTheme(id){
  const pill=document.getElementById('vpill_'+id);
  if(activeThemes.has(id)){activeThemes.delete(id);pill.classList.remove('on');}
  else{activeThemes.add(id);pill.classList.add('on');}
}

function fmtDt(iso){return new Date(iso).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});}

function updatePeriodInfo(){
  const last=store.briefs.length?store.briefs[store.briefs.length-1].generatedAt:null;
  document.getElementById('periodInfo').textContent=last?`↻ Couvrira les actus depuis le ${fmtDt(last)}`:'↻ Premier brief — dernières 24-48h';
}

async function generateBrief(){
  if(!activeThemes.size)return;
  const btn=document.getElementById('genBtn');const icon=document.getElementById('genIcon');
  btn.disabled=true;icon.textContent='↻';icon.className='spin';
  const selected=THEMES.filter(t=>activeThemes.has(t.id));
  const today=new Date().toLocaleDateString('fr-FR',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const last=store.briefs.length?store.briefs[store.briefs.length-1].generatedAt:null;
  const periodStr=last?`Couvre UNIQUEMENT les événements entre le ${fmtDt(last)} et maintenant.`:'Couvre les dernières 24-48h.';
  const briefId=Date.now();

  document.getElementById('briefContent').innerHTML=`<div class="brief-content">${selected.map(t=>`
    <div class="bsec" id="bsec_${t.id}">
      <div class="bsec-head" onclick="toggleSec('${t.id}')">
        <div class="bsec-icon">${t.icon}</div>
        <div class="bsec-label" style="color:${t.color};">${t.label.toUpperCase()}</div>
        <div class="bsec-actions" onclick="event.stopPropagation()">
          <button class="star-btn" id="star_${briefId}_${t.id}" onclick="toggleStar(${briefId},'${t.id}',this)">⭐ sauvegarder</button>
        </div>
      </div>
      <div class="bsec-body open" id="bsbody_${t.id}"><div class="skel" style="width:90%"></div><div class="skel" style="width:70%"></div><div class="skel" style="width:80%"></div></div>
    </div>`).join('')}</div>`;

  const sys=`Agent de veille. Date: ${today}. ${periodStr} Réponds UNIQUEMENT en JSON valide sans markdown. Format: {"sections":[{"id":"id_theme","content":"HTML: chaque point commence par <a href='URL_REELLE' target='_blank'><strong>Titre de l'actu</strong></a> suivi d'un court résumé. 3-5 points par thème. Français concis et factuel."}]} IDs disponibles: ${THEMES.map(t=>t.id).join(',')}. Génère seulement les sections demandées.`;
  const userMsg=`Brief pour : ${selected.map(t=>t.label).join(', ')}. ${periodStr} Recherche et résume 3-5 points importants par thème avec les vraies URLs sources.`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:4000,system:sys,tools:[{type:'web_search_20250305',name:'web_search'}],messages:[{role:'user',content:userMsg}]})
    });
    const data=await res.json();
    const textBlock=data.content?.filter(b=>b.type==='text').pop();
    if(!textBlock)throw new Error('Pas de réponse texte');
    let parsed;
    try{parsed=JSON.parse(textBlock.text.replace(/```json|```/g,'').trim());}
    catch(e){parsed={sections:selected.map(t=>({id:t.id,content:textBlock.text}))};}

    const brief={id:briefId,generatedAt:new Date().toISOString(),periodFrom:last,themes:selected.map(t=>t.id),sections:parsed.sections};
    store.briefs.push(brief);vsave();
    parsed.sections.forEach(sec=>{const b=document.getElementById('bsbody_'+sec.id);if(b){b.innerHTML=sec.content;b.classList.add('open');}});
    updatePeriodInfo();updateSavedCount();
  }catch(e){document.getElementById('briefContent').innerHTML=`<div class="empty" style="color:var(--red);">Erreur : ${e.message}</div>`;}
  btn.disabled=false;icon.textContent='⚡';icon.className='';
}

function toggleSec(id){const b=document.getElementById('bsbody_'+id);if(b)b.classList.toggle('open');}

function toggleStar(briefId,sectionId,btn){
  const key=`${briefId}_${sectionId}`;
  const idx=store.saved.findIndex(s=>s.key===key);
  if(idx>=0){store.saved.splice(idx,1);btn.classList.remove('on');btn.textContent='⭐ sauvegarder';}
  else{
    const brief=store.briefs.find(b=>b.id===briefId);
    const sec=brief?.sections.find(s=>s.id===sectionId);
    const t=THEMES.find(x=>x.id===sectionId)||{icon:'',label:sectionId,color:'#888'};
    if(sec)store.saved.push({key,briefId,sectionId,themeLabel:t.label,themeIcon:t.icon,themeColor:t.color,content:sec.content,savedAt:new Date().toISOString(),briefDate:brief.generatedAt});
    btn.classList.add('on');btn.textContent='✓ sauvegardé';
  }
  vsave();updateSavedCount();
}

function updateSavedCount(){const el=document.getElementById('savedCount');el.textContent=store.saved.length?`(${store.saved.length})`:'';  }

function renderHist(){
  const el=document.getElementById('histList');
  if(!store.briefs.length){el.innerHTML='<div class="empty">Aucun brief généré.</div>';return;}
  el.innerHTML=[...store.briefs].reverse().map((b,i)=>`
    <div class="hist-item">
      <div><div class="hist-date">${i===0?'● DERNIER — ':''} ${fmtDt(b.generatedAt)}</div></div>
      <div class="hist-themes">${b.themes.map(id=>{const t=THEMES.find(x=>x.id===id);return t?t.icon:'';}).join('')}</div>
      <div class="hist-period">${b.periodFrom?'Depuis '+fmtDt(b.periodFrom):'Premier brief'}</div>
      <button class="hist-open" onclick="loadBrief(${b.id})">OUVRIR</button>
      <button class="hist-del" onclick="delBrief(${b.id})">×</button>
    </div>`).join('');
}

function loadBrief(id){
  const brief=store.briefs.find(b=>b.id===id);if(!brief)return;
  const selected=THEMES.filter(t=>brief.themes.includes(t.id));
  document.getElementById('briefContent').innerHTML=`<div class="brief-content">${selected.map(t=>{
    const sec=brief.sections.find(s=>s.id===t.id);
    const isSaved=store.saved.some(s=>s.key===`${brief.id}_${t.id}`);
    return `<div class="bsec">
      <div class="bsec-head" onclick="this.nextElementSibling.classList.toggle('open')">
        <div class="bsec-icon">${t.icon}</div>
        <div class="bsec-label" style="color:${t.color};">${t.label.toUpperCase()}</div>
        <div class="bsec-actions" onclick="event.stopPropagation()">
          <button class="star-btn ${isSaved?'on':''}" onclick="toggleStar(${brief.id},'${t.id}',this)">${isSaved?'✓ sauvegardé':'⭐ sauvegarder'}</button>
        </div>
      </div>
      <div class="bsec-body open">${sec?sec.content:'Non disponible'}</div>
    </div>`;
  }).join('')}</div>`;
  showView('brief');
}

function delBrief(id){
  store.briefs=store.briefs.filter(b=>b.id!==id);
  store.saved=store.saved.filter(s=>s.briefId!==id);
  vsave();renderHist();updateSavedCount();updatePeriodInfo();
}

function renderSaved(){
  const el=document.getElementById('savedList');
  if(!store.saved.length){el.innerHTML='<div class="empty">Aucune actu sauvegardée.<br>Clique sur ⭐ dans un brief.</div>';return;}
  el.innerHTML=[...store.saved].reverse().map(s=>`
    <div class="saved-card">
      <div class="saved-head">
        <div style="font-size:16px;">${s.themeIcon}</div>
        <div><div style="font-family:var(--mono);font-size:11px;font-weight:700;color:${s.themeColor};">${s.themeLabel.toUpperCase()}</div><div class="saved-meta">Sauvegardé le ${fmtDt(s.savedAt)} · Brief du ${fmtDt(s.briefDate)}</div></div>
        <button class="saved-del" onclick="delSaved('${s.key}')">×</button>
      </div>
      <div class="saved-body">${s.content}</div>
    </div>`).join('');
}

function delSaved(key){store.saved=store.saved.filter(s=>s.key!==key);vsave();renderSaved();updateSavedCount();}

buildThemePills();
updatePeriodInfo();
updateSavedCount();
</script>
</body>
</html>
